name: 'Get Star Count'

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'
  push:
    branches:
      - main
    paths: 'plugin-list/**'

concurrency:
  group: 'get-star-count'
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  UpdateStarCount:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 'Set up node 20.x'
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json
      - name: 'Install dependencies'
        run: npm ci
        working-directory: scripts
      - name: 'Run get star count script'
        timeout-minutes: 10
        run: node update-star-count
        id: node
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: scripts/update-star-count
      - name: 'Commit'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add --all
          git diff --staged --quiet || git commit -m "chore: update star count [skip ci]"
          git push || echo "No change to commit"
