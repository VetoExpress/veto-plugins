name: 'Build Registry and Push'

on:
  workflow_dispatch:
  pull_request:
    branches: 
      - main
    types: [closed]
  push:
    branches: 
      - main
    paths:
      - plugins-data/**

concurrency:
  group: 'pack-and-push'
  cancel-in-progress: true

jobs:
  BuildAndPush:
    if: (github.event_name == 'pull_request' && github.event.pull_request.merged) || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 'Set up node 20.x'
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: 'scripts/package-lock.json'
      - name: 'Install dependencies'
        run: npm ci
        working-directory: scripts
      - name: 'Build dist/registry.json'
        timeout-minutes: 10
        run: node pack-plugins
        id: pack
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: scripts/pack-plugins
      - name: 'Commit and push dist/registry.json'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add dist/registry.json
          git diff --staged --quiet || git commit -m "chore: rebuild dist/registry.json [skip ci]"
          git push
